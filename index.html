<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
  <title>Text file viewer</title>
  <!-- inlining icon as part of single file app approach. This is the twemoji pencil icon -->
  <link rel="icon" type="image/png"
    href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEgAAABICAMAAABiM0N1AAAAsVBMVEVHcEzZnoLZnoLZnoLM1t3qWW7ZnoL/zE3qWW7ZnoLZnoKZqrWisbzZnoLZnoLZnoLqWW4pLzMpLzMpLzPZnoLqWW7qWW7ZnoLZnoLqWW4pLzPqWW7qWW67x9DV1MUpLzPqWW4pLzPZnoLZnoIpLzPZnoLM1t0pLzOZqrXqWW7J09ujsr3/zE3nr27DkHjCztb8zVacrbi5xs7W1MLfiJg0NjhKREKXdGQ/PT1rWVF2YFZwkFC4AAAAJXRSTlMA7yAQYGBgYBDPgGBgcL/fgIBwz49wIJ9Q799Qn2BgYM8gQDAQun1/XwAAAWBJREFUeNrt0GdywlAMRWG5Aqb3DiGJCyW9Z/8LSygzF2eCxnryT58FfCNdOm/Qb7W8Mmkrz9b7xlOtc7U+5akdSCoHvbo5OVHk5uRED9WcnKcEks5JknlOzjN2UjrRpiaDZpecrWynwWUnSSQ39RlnuxHs1OKcKFoIIM55eSxlhTze2e2ySuUx72SXpqwjkTzGEUqMI5NcxhFKjCOTqowjlBhHJs0ZR7hTytFINcaR7gRHeRMcpeTCUUoLOEqptCukQiqkQsog3Y1UEpzQcjQSnDAMSCPBCZtkLME55KskOGGDDCU4p2yVBCesk4EEB1XIRIKDbDMJDn4zkOCgBplIcJBjIsFBPhlIcNCQpBKcVBaJJTipbsTSyPoXCkicEzT/Kvff7xMyyW+knI+3OI6XZJTda+KevRN3yTS7XjlCX/GhFZnn+MPf6T+PUId0XfcmR6hN6pZdXKRs1Wm3b38Ai5w9ZKhA8zsAAAAASUVORK5CYII=">
  <base target="_blank">
  <link rel="stylesheet" href="public/style.css">
</head>

<body>

  <dialog id="file-content-modal" data-action="close-file-content-outside">
    <!-- The inner element which is tracked by the view-transition-name -->
    <div id="moving-file-content-container">
      <div id="modal-content" tabindex="0" class="color-dynamic-fade" data-color="">
        <div class="color-dynamic" id="file-content-header" data-color="">

          <div id="save-popover" class="btn-save" popover="manual"></div>
          <button id="save-btn" class="btn-save" data-action="save-file-copy">save</button>

          <select id="file-content-history-select" data-action="history-select-change"></select>

          <label class="checkbox-minmax">
            <input type="checkbox" name="modalmaxscreen" id="modalmaxscreen" data-action="toggle-modal-maxscreen">
            <svg class="minmax-svg modalmax-svg" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 115.2 113.3" width="115.2" height="113.3"><g stroke="#1e1e1e" stroke-width="6" fill="none" stroke-linecap="round"><g transform="translate(63.2 49.9)"><path d="M0 0C6.5-6.4 32.4-31.9 38.9-38.2M0 0C6.5-6.4 32.4-31.9 38.9-38.2"/></g><g transform="translate(49.3 63.8)"><path d="M0 0C-6 5.7-30.1 28.5-36.1 34.2M0 0C-6 5.7-30.1 28.5-36.1 34.2"/></g><g transform="translate(101.9 11.6)"><path d="M0 0C0.6 3.6 2.8 17.9 3.3 21.4M0 0C0.6 3.6 2.8 17.9 3.3 21.4"/></g><g transform="translate(100.6 10.3)"><path d="M0 0C-3.5-0.1-17.3-0.3-20.8-0.3M0 0C-3.5-0.1-17.3-0.3-20.8-0.3"/></g><g transform="translate(11.6 99)"><path d="M0 0C-0.3-4.1-1.3-20.5-1.6-24.6M0 0C-0.3-4.1-1.3-20.5-1.6-24.6"/></g><g transform="translate(14.5 100)"><path d="M0 0C3.9 0.6 19.5 2.8 23.4 3.3M0 0C3.9 0.6 19.5 2.8 23.4 3.3"/></g></g></svg>
            <svg class="minmax-svg modalmin-svg" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 111 112.2" width="111" height="112.2"><g stroke="#1e1e1e" stroke-width="6" fill="none" stroke-linecap="round"><g transform="translate(10 102.2)"><path d="M0 0C6.5-6.4 32.4-31.9 38.9-38.2M0 0C6.5-6.4 32.4-31.9 38.9-38.2"/></g><g transform="translate(101 10)"><path d="M0 0C-6 5.7-30.1 28.5-36.1 34.2M0 0C-6 5.7-30.1 28.5-36.1 34.2"/></g><g transform="translate(48.7 64)"><path d="M0 0C0.6 3.6 2.8 17.9 3.3 21.4M0 0C0.6 3.6 2.8 17.9 3.3 21.4"/></g><g transform="translate(48.4 64.6)"><path d="M0 0C-3.5-0.1-17.3-0.3-20.8-0.3M0 0C-3.5-0.1-17.3-0.3-20.8-0.3"/></g><g transform="translate(63.3 45.2)"><path d="M0 0C-0.3-4.1-1.3-20.5-1.6-24.6M0 0C-0.3-4.1-1.3-20.5-1.6-24.6"/></g><g transform="translate(64.3 45.2)"><path d="M0 0C3.9 0.6 19.5 2.8 23.4 3.3M0 0C3.9 0.6 19.5 2.8 23.4 3.3"/></g></g></svg>
          </label>
          <button id="modal-close-btn" class="modal-close-btn" data-action="close-file-content-modal">✕</button>
        </div>
        <div id="modal-content-text" data-prop="content"></div>
      </div>
      <div id="file-content-footer">

        <div class="flex-row editor-btns">
          <button data-action="editor-color-pick">color</button>
          <button data-action="editor-undo">undo</button>
          <button data-action="editor-redo">redo</button>
        </div>

        <div class="flexgrow"></div>

        <div class="flex-row label_group_text_toggle">
          <div>html</div>
          <label for="render_toggle" class="switch"><input type="checkbox" id="render_toggle" name="render_toggle"
              data-action="toggle-render-text" autofocus><span class="slider"></span></label>
          <div>txt</div>
        </div>

      </div>
    </div>
  </dialog>

  <div class="flex-row">
    <div>
      <button id="btn_loadFileHandles" data-click-loadfiles>Files</button>
      <button id="btn_loadDirectoryHandles" data-click-loadfolder>Folder</button>
      <span id=fileCountElement>No files loaded</span>
    </div>

    <div class="flexgrow"></div>

    <!-- removing temporarily <label>
      <input type="checkbox" name="fullscreen" id="fullscreen" data-action="toggle-fullscreen">
    </label> -->

    <button id="btn-settings" data-action="open-settings-modal" class="btn-press">
      <svg id="btn-settings-svg" version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 382"><defs><!-- Shape A: The side connector / leg --><path id="a" d="M0 0C5.37-4.76 12.79-11.16 15.7-13.13C22.1-17.08 34.29-22.66 36.05-23.43" /><!-- Shape B: The outer tooth cap --><path id="b"d="M0 0C0.91-7.78-1.34-37.55 5.47-46.67C12.28-55.79 29.72-54.23 40.87-54.71C52.03-55.2 65.6-59.06 72.42-49.56C79.23-40.07 80.19-6.38 81.75 2.25" /><!-- The complete tooth assembly --><g id="tooth"><use href="#a" transform="translate(-81 -84)" stroke-dasharray="50 200" stroke-dashoffset="-15" /><use href="#b" transform="translate(-41 -114)" /></g></defs><g stroke="black" stroke-width="30" fill="none" stroke-linecap="round"><!-- Central Hub --><circle cx="180" cy="191" r="61.22" fill="transparent" /><!-- Radially repeated teeth with offset --><g transform="translate(180 191)"><use href="#tooth" transform="rotate(0)" /><use href="#tooth" transform="rotate(60)" /><use href="#tooth" transform="rotate(120)" /><use href="#tooth" transform="rotate(180)" /><use href="#tooth" transform="rotate(240)" /><use href="#tooth" transform="rotate(300)" /></g></g></svg>
    </button>
  </div>

  <main>

    <div class="stick-top">

        <div class="flex-row justify-content-center">

          <label id="contentsearch-label" title="click to toggle file content search on and off">
            <input type="checkbox" name="contentsearch" id="contentsearch" data-action="toggle-content-search">
            <svg title="content search off - click to search inside files" version="1.1" class="contentsearch-svg"id="contentsearch-svg-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 120" width="100"height="50"><defs><style class="style-fonts"></style></defs><g stroke="black" stroke-width="24" fill="none" stroke-linecap="round"><g transform="translate(18.67 10) rotate(0 95.33 24.99)"><path d="M0 0 C6 5.82, 20.67 26.61, 36 34.94 C51.33 43.26, 73.78 49.74, 92 49.97 C110.22 50.21, 128.89 44.22, 145.33 36.36 C161.78 28.51, 183.11 8.44, 190.67 2.85 M0 0 C6 5.82, 20.67 26.61, 36 34.94 C51.33 43.26, 73.78 49.74, 92 49.97 C110.22 50.21, 128.89 44.22, 145.33 36.36 C161.78 28.51, 183.11 8.44, 190.67 2.85"></path></g><g transform="translate(110 60) rotate(0 0.33 15.67)"><path d="M0 0 C0.11 5.22, 0.56 26.11, 0.67 31.33 M0 0 C0.11 5.22, 0.56 26.11, 0.67 31.33"></path></g><g transform="translate(186.67 32) rotate(0 9.67 10.67)"><path d="M0 0 C3.22 3.56, 16.11 17.78, 19.33 21.33 M0 0 C3.22 3.56, 16.11 17.78, 19.33 21.33"></path></g><g transform="translate(152 50) rotate(0 7.33 12)"><path d="M0 0 C2.44 4, 12.22 20, 14.67 24 M0 0 C2.44 4, 12.22 20, 14.67 24"></path></g><g transform="translate(34 30.67) rotate(0 -12 10.33)"><path d="M0 0 C-4 3.44, -20 17.22, -24 20.67 M0 0 C-4 3.44, -20 17.22, -24 20.67"></path></g><g transform="translate(73.33 51.33) rotate(0 -8 13.67)"><path d="M0 0 C-2.67 4.56, -13.33 22.78, -16 27.33 M0 0 C-2.67 4.56, -13.33 22.78, -16 27.33"></path></g></g></svg>
            <svg version="1.1" class="contentsearch-svg" id="contentsearch-svg-open" xmlns="http://www.w3.org/2000/svg"viewBox="0 0 211.67 118.97" width="100" height="50"><defs><style class="style-fonts"></style></defs><g stroke="black" stroke-width="24" fill="none" stroke-linecap="round"><g transform="translate(11 58.99)"><path d="M0 0 C6 5.82, 20.67 26.61, 36 34.94 C51.33 43.26, 73.78 49.74, 92 49.97 C110.22 50.21, 128.89 44.22, 145.33 36.36 C161.78 28.51, 183.11 8.44, 190.67 2.85"></path></g><g transform="translate(200.67 59.98)"><path d="M0 0 C-6 -5.82, -20.67 -26.61, -36 -34.94 C-51.33 -43.26, -73.78 -49.74, -92 -49.97 C-110.22 -50.21, -128.89 -44.22, -145.33 -36.36 C-161.78 -28.51, -183.11 -8.44, -190.67 -2.85"></path></g><g transform="translate(53.33 23.99)"><path d="M0 0 C-1.89 4.22, -9.44 16.78, -11.33 25.33 C-13.22 33.89, -13.33 43.22, -11.33 51.33 C-9.33 59.44, -1.33 70.22, 0.67 74"></path></g><g transform="translate(152.27 21.66)"><path d="M0 0 C1.89 4.22, 9.44 16.78, 11.33 25.33 C13.22 33.89, 13.33 43.22, 11.33 51.33 C9.33 59.44, 1.33 70.22, -0.67 74"></path></g><g transform="translate(83.67 37.32)"><circle cx="22.67" cy="22.67" r="22.67" fill="black" stroke="none"></circle></g></g></svg>
          </label>

          <div class="searchbox-container flexgrow">
            <input data-action="search-files" type="text" id="searchbox" name="searchbox" size="10"
            minlength="3" maxlength="100" placeholder='' autocomplete="off"/>

            <button class="searchbox-tag-btn" data-action="show-tag-taxonomy">#</button>
          </div>

          <button title="click to search" id="btn_search" class="btn-press" data-action="searchbox-search">
            <svg version="1.1" id="btn-press-enter-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"width="100" height="80" preserveAspectRatio="none"><defs><style class="style-fonts"></style></defs><g stroke="#1e1e1e" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"><g transform="translate(35.28 46.29)"><polygon points="0,0 -25.28,22.09 -0.13,41.49" fill="none"></polygon></g><g transform="translate(83.39 10)"><path d="M0 0 C0.27 9.59, 1.37 47.94, 1.65 57.53"></path></g><g transform="translate(85.78 67.31)"><path d="M0 0 C-11.23 0.12, -56.17 0.62, -67.41 0.74"></path></g></g></svg>
          </button>

        </div>
    </div>
      <div id="filter-box">
        <div class="flex-row label_group_filter_toggle">

          <div class="ANDOR_label">OR</div>
          <label for="and_filter" class="switch"><input type="checkbox" id="and_filter" name="and_filter"
              data-action="toggle-filter-mode"><span class="slider"></span></label>
          <div class="ANDOR_label">AND</div>

        </div>

        <div id="filter-output"></div>

        <label for="toggle-search-highlights" class="filter-options toggle-search-highlights-label">
          <input type="checkbox" id="toggle-search-highlights" name="toggle-search-highlights" checked>
        </label>
        <button class="clear-filters filter-options" data-action="clear-all-filters">clear</button>

      </div>
    
    <div class="file-display-controls margin-bottom">
      <div class="flexgrow"></div>

      <div class="sort-controls">
        sort:
        <label for="sort-select">
          <select id="sort-select" data-action="sort-select">
          </select>
        </label>

          <label class="sort-direction-label" for="sort-direction">
            <input type="checkbox" id="sort-direction" data-action="sort-direction-toggle">
          </label>
      </div>

      <div class="view-controls">
        view:
        <label for="view-select">
          <select id="view-select" data-action="view-select">
          </select>
        </label>
      </div>
    </div>


    <div id="tag-taxonomy-container"></div>

    <div id="output"></div>
  </main>

  <dialog id="modal-settings" data-action="close-settings-outside">
    <button class="modal-close-btn" data-action="close-settings-modal">✕</button>
    <h2 class="settings-title">Settings</h2>

    <div class="settings-row">
      <span class="settings-label">Colour theme</span>
      <div class="color-select-radio">
        <label class="formcontrol"><input type="radio" name="radio" />snow</label>
        <label class="formcontrol"><input type="radio" name="radio" id="glow" />glow</label>
        <label class="formcontrol"><input type="radio" name="radio" id="blackandwhite" checked />b&w</label>
      </div>
    </div>

    <label class="settings-row">
      <span class="settings-label">Font size (app)</span>
      <input type="range" min="12" max="24" disabled>
    </label>

    <label class="settings-row">
      <span class="settings-label">Font size (text file)</span>
      <input type="range" min="12" max="32" disabled>
    </label>

    <label class="settings-row">
      <span class="settings-label">Font style</span>
      <select disabled>
        <option>sans-serif</option>
        <option>serif</option>
        <option>monospace</option>
      </select>
    </label>

    <label class="settings-row">
      <span class="settings-label">Pagination size</span>
      <input type="number" min="10" max="200" disabled>
    </label>

    <div class="settings-row">
      <span class="settings-label">Tag autocomplete</span>
      <label class="switch"><input type="checkbox" disabled><span class="slider"></span></label>
    </div>
  </dialog>

  <dialog id="modal-unsaved-warning">
    <p id="modal-unsaved-warning-text"></p>
    <div class="unsaved-warning-buttons">
      <button id="modal-unsaved-warning-proceed" class="unsaved-warning-button-discard" data-action="warning-proceed"></button>
      <button id="modal-unsaved-warning-cancel" class="unsaved-warning-button-keep" data-action="warning-cancel"></button>
    </div>
  </dialog>

  <dialog id="modal-file-options" closedby="any">
    <button class="modal-close-btn" data-action="file-options-cancel">✕</button>
    <h2>File options</h2>
    <form class="file-options-form">
      <div class="file-options-field">
        <label for="file-options-folder-input">Change folder:</label>
        <div class="file-options-field-row">
          <input id="file-options-folder-input" type="text" list="gypsum-folders" autocomplete="off" placeholder="(root)">
          <button type="button" data-action="file-options-move-confirm">move</button>
        </div>
      </div>
      <div class="file-options-field">
        <label for="rename-name-input">Change filename:</label>
        <div class="file-options-field-row">
          <input id="rename-name-input" type="text" autocomplete="off">
          <button type="button" data-action="rename-confirm">rename</button>
        </div>
      </div>
      <p id="file-options-error-slot" class="file-options-error"></p>
      <div class="flex-column">
        <button type="button" class="file-options-button-delete" data-action="delete-file">delete file</button>
      </div>
    </form>
  </dialog>

  <dialog id="modal-color-picker" data-action="close-color-picker-outside">
    <div id="color-picker-content"></div>
  </dialog>

  <datalist id="gypsum-folders"></datalist>

  <button id="btn-new-note" data-action="create-new-note" disabled>+</button>

</body>
<script type="module" src="public/main.js"></script>

</html>
